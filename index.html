<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鑫囍探索 - 奢華海島行程全功能生成器 V4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        .editor-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .control-panel {
            width: 48%;
            background: #ffffff;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .preview-panel {
            width: 52%;
            padding: 30px;
            overflow-y: auto;
            background: #e0e4e8;
        }

        /* 模組卡片設計 */
        .module-section {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .module-header {
            background: #f8f9fa;
            padding: 12px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #4c2a85;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .module-body {
            padding: 20px;
            transition: all 0.3s;
        }

        .module-body.is-hidden {
            display: none;
        }

        .j-card-input {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
            position: relative;
            border-left: 4px solid #4c2a85;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .mock-fillo-body {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 0;
            height: 80vh;
            min-height: 400px;
            overflow: hidden;
            transition: width 0.3s ease, border 0.3s ease, border-radius 0.3s ease;
            margin: 0 auto;
            width: 100%;
        }

        .mock-fillo-body.mobile-mode {
            width: 375px;
            height: 812px;
            min-height: auto;
            border: 12px solid #222;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .mock-fillo-body.mobile-mode::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #222;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 9999;
        }

        .brand-btn {
            background-color: #4c2a85;
            color: white;
        }

        .brand-btn:hover {
            background-color: #381b66;
            color: white;
        }

        /* 開關樣式 */
        .form-check-input:checked {
            background-color: #28a745;
            border-color: #28a745;
        }
    </style>
</head>

<body>

    <div class="editor-container">

        <!-- 左側：輸入控制台 -->
        <div class="control-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 style="color: #4c2a85; font-weight: bold; margin:0;">💎 頂級奢華版型生成器 V4</h4>
                <span class="badge bg-secondary">9 大模組自由配</span>
            </div>

            <!-- 1. 橫幅 -->
            <div class="module-section" id="mod-hero">
                <div class="module-header">
                    <div class="module-title">1. 主視覺與標題</div>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-hero" checked>
                        <label class="form-check-label small">顯示</label>
                    </div>
                </div>
                <div class="module-body">
                    <input type="text" id="heroTitle" class="form-control mb-2" value="馬爾地夫 ‧ 水上別墅蜜月奢旅">
                    <input type="text" id="heroSub" class="form-control mb-2" value="Maldives Honeymoon ‧ 7 Days"
                        placeholder="副標題">
                    <input type="text" id="bannerImg" class="form-control"
                        value="https://jollifytravel.com/material-alias/mj/japan2026/mj2026-m(1).jpg"
                        placeholder="主視覺圖片網址">
                </div>
            </div>

            <!-- 2. 行程速覽 -->
            <div class="module-section" id="mod-quick">
                <div class="module-header">
                    <div class="module-title">2. 行程速覽卡</div>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-quick" checked>
                        <label class="form-check-label small">顯示</label>
                    </div>
                </div>
                <div class="module-body">
                    <div class="row g-2 mb-2">
                        <div class="col-6"><label class="small text-muted">天數</label><input type="text" id="qDuration"
                                class="form-control form-control-sm" value="7 天 5 夜"></div>
                        <div class="col-6"><label class="small text-muted">成行人數</label><input type="text" id="qGroup"
                                class="form-control form-control-sm" value="2 人成行 / 蜜月專案"></div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><label class="small text-muted">出發檔期</label><input type="text" id="qDepart"
                                class="form-control form-control-sm" value="每月 1 梯 / 2026 全年"></div>
                        <div class="col-6"><label class="small text-muted">參考售價</label><input type="text" id="qPrice"
                                class="form-control form-control-sm" value="NT$ 268,000 / 人起"></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-12"><label class="small text-muted">搭乘航空</label><input type="text" id="qFlight"
                                class="form-control form-control-sm" value="新加坡航空 / 經 SIN 轉機"></div>
                    </div>
                </div>
            </div>

            <!-- 3. 行程特色 -->
            <div class="module-section" id="mod-highlight">
                <div class="module-header">
                    <div class="module-title">3. 行程特色 (Highlights)</div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addHighlight()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-highlight"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="highlightsContainer"></div>
            </div>

            <!-- 4. 景點特色 -->
            <div class="module-section" id="mod-spot">
                <div class="module-header">
                    <div class="module-title">
                        4. 景點特色
                        <select id="spotLayout" class="form-select form-select-sm ms-2"
                            style="width: auto; display: inline-block;">
                            <option value="fullimg">純圖片滿版</option>
                            <option value="ltr">左圖右文交錯</option>
                            <option value="grid">景點卡片格</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addSpot()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-spot" checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="spotsContainer"></div>
            </div>

            <!-- 5. 航班資訊 -->
            <div class="module-section" id="mod-flight">
                <div class="module-header">
                    <div class="module-title">5. 專屬航班 (Timeline)</div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addFlight()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-flight"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="flightsContainer"></div>
            </div>

            <!-- 5. 嚴選住宿 -->
            <div class="module-section" id="mod-hotel">
                <div class="module-header">
                    <div class="module-title">
                        6. 嚴選住宿
                        <select id="hotelLayout" class="form-select form-select-sm ms-2"
                            style="width: auto; display: inline-block;">
                            <option value="overlap">破格交疊風</option>
                            <option value="grid">經典格狀卡片</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addHotel()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-hotel"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="hotelsContainer"></div>
            </div>

            <!-- 6. 每日行程 -->
            <div class="module-section" id="mod-itinerary">
                <div class="module-header">
                    <div class="module-title">7. 每日行程 (Daily)</div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addDayField()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-itinerary"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="dayFieldsContainer"></div>
            </div>

            <!-- 7. 注意事項 -->
            <div class="module-section" id="mod-notice">
                <div class="module-header">
                    <div class="module-title">8. 報名注意事項</div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addNotice()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-notice"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="noticesContainer"></div>
            </div>

            <!-- 8. 推薦行程 -->
            <div class="module-section" id="mod-recommend">
                <div class="module-header">
                    <div class="module-title">9. 其他推薦行程</div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="addRecommend()">＋ 新增</button>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input toggle-visible" type="checkbox" data-target="mod-recommend"
                                checked>
                            <label class="form-check-label small">顯示</label>
                        </div>
                    </div>
                </div>
                <div class="module-body" id="recommendsContainer"></div>
            </div>

            <!-- 產生代碼按鈕 -->
            <div class="mt-4 mb-5 d-grid gap-2">
                <button class="btn brand-btn btn-lg" onclick="generateOutputCode()">⚡ 分拆產出 Fillo 代碼</button>
            </div>

            <!-- 分離式輸出區塊 -->
            <div class="mb-5 d-none" id="outputSection">
                <div class="mb-3"><label class="form-label font-weight-bold text-success">① HTML
                        (貼入網頁編輯器)</label><textarea id="outHtml"
                        class="form-control text-monospace bg-dark text-light mb-1" rows="5" readonly
                        onclick="this.select()"></textarea><button class="btn btn-success btn-sm w-100"
                        onclick="copyCode('outHtml')">複製 HTML</button></div>
                <div class="mb-3"><label class="form-label font-weight-bold text-success">② CSS
                        (全域或自訂內容)</label><textarea id="outCss"
                        class="form-control text-monospace bg-dark text-light mb-1" rows="4" readonly
                        onclick="this.select()"></textarea><button class="btn btn-success btn-sm w-100"
                        onclick="copyCode('outCss')">複製 CSS</button></div>
                <div class="mb-3"><label class="form-label font-weight-bold text-success">③ JS (分頁與動畫)</label><textarea
                        id="outJs" class="form-control text-monospace bg-dark text-light mb-1" rows="4" readonly
                        onclick="this.select()"></textarea><button class="btn btn-success btn-sm w-100"
                        onclick="copyCode('outJs')">複製 JS</button></div>
            </div>
        </div>

        <!-- 右側：預覽 -->
        <div class="preview-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <p class="text-muted m-0">💡 開關與樣板切換會即時反映在下方</p>
                <div class="btn-group btn-group-sm" role="group">
                    <input type="radio" class="btn-check" name="previewMode" id="modeDesktop" value="desktop" autocomplete="off" checked>
                    <label class="btn btn-outline-secondary" for="modeDesktop">💻 電腦</label>
                    <input type="radio" class="btn-check" name="previewMode" id="modeMobile" value="mobile" autocomplete="off">
                    <label class="btn btn-outline-secondary" for="modeMobile">📱 手機</label>
                </div>
            </div>
            <div class="mock-fillo-body" id="livePreviewContainer">
                <iframe id="previewIframe" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
        </div>

    </div>

    <script>
        // --- 輔助函數 ---
        function escapeHtml(str = '') {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        function padDay(num) {
            return String(num).padStart(2, '0');
        }
        function renderDayPanel(day, act = '', sty = '') {
            const dayNo = padDay(day.dayIndex);
            const routeHtml = day.route ? `<span class="day-route">${escapeHtml(day.route)}</span>` : '';
            const leadHtml = day.lead ? `<p class="day-lead">${escapeHtml(day.lead).replace(/\n/g, '<br>')}</p>` : '';
            const points = Array.isArray(day.points) ? day.points.filter(Boolean) : [];
            const pointsHtml = points.length ? `<ul class="day-points">${points.map(point => `<li>${escapeHtml(point)}</li>`).join('')}</ul>` : '';
            
            const mealItems = [];
            if (day.meals?.breakfast) mealItems.push(`<span><strong>BREAKFAST</strong> ${escapeHtml(day.meals.breakfast)}</span>`);
            if (day.meals?.lunch) mealItems.push(`<span><strong>LUNCH</strong> ${escapeHtml(day.meals.lunch)}</span>`);
            if (day.meals?.dinner) mealItems.push(`<span><strong>DINNER</strong> ${escapeHtml(day.meals.dinner)}</span>`);
            const mealsHtml = mealItems.length ? `<div class="day-meals-row">${mealItems.join('')}</div>` : '';
            
            const stayHtml = day.stay ? `<div class="day-stay"><span class="stay-label">當晚住宿</span><span class="stay-name">${escapeHtml(day.stay)}</span></div>` : '';
            const imageHtml = day.image?.url
                ? `<img src="${escapeHtml(day.image.url)}" alt="DAY ${dayNo}" loading="lazy">`
                : `<div class="img-slot ratio-full">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:40px;height:40px;opacity:0.5;margin-bottom:10px;">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    ${day.image?.label ? `<span class="slot-label">${escapeHtml(day.image.label)}</span><br>` : ''}
                    ${day.image?.subtitle ? `<span class="slot-sub">${escapeHtml(day.image.subtitle)}</span>` : ''}
                  </div>`;
            return `
            <div class="j-day-panel day-panel ${act}" id="panel-${day.dayIndex}" style="${sty}" role="tabpanel" data-day="${day.dayIndex}">
                <div class="day-grid swipe-hint-target">
                    <div class="day-image-area">
                        <span class="day-stamp">DAY ${dayNo}</span>
                        ${imageHtml}
                    </div>
                    <div class="day-text-area">
                        ${routeHtml}
                        <h3 class="day-title">${escapeHtml(day.title || \`DAY \${dayNo}\`)}</h3>
                        ${leadHtml}
                        ${pointsHtml}
                        ${mealsHtml}
                        ${stayHtml}
                    </div>
                </div>
            </div>`;
        }
        function initDaySwipeHint(context = document) {
            const grids = context.querySelectorAll('.jollify-luxury-theme .day-grid');
            grids.forEach(grid => {
                if (grid.dataset.swipeHintInit === '1') return;
                grid.dataset.swipeHintInit = '1';
                const stopHint = () => {
                    grid.classList.remove('is-swipe-hint');
                    grid.dataset.swiped = '1';
                };
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (!entry.isIntersecting) return;
                        if (grid.dataset.swiped === '1') return;
                        if (window.innerWidth > 768) return;
                        grid.classList.add('is-swipe-hint');
                        observer.disconnect();
                    });
                }, { threshold: 0.45 });
                observer.observe(grid);
                grid.addEventListener('touchstart', stopHint, { passive: true });
                grid.addEventListener('scroll', stopHint, { passive: true });
            });
        }
        
        // --- 預設資料設定 ---
        let hCount = 0, fCount = 0, spCount = 0, htCount = 0, dCount = 0, nCount = 0, rCount = 0;

        // 開關控制邏輯
        document.querySelectorAll('.toggle-visible').forEach(toggle => {
            toggle.addEventListener('change', function () {
                const targetId = this.getAttribute('data-target');
                const body = document.querySelector(`#${targetId} .module-body`);
                if (this.checked) body.classList.remove('is-hidden');
                else body.classList.add('is-hidden');
                updatePreview();
            });
        });

        document.getElementById('hotelLayout').addEventListener('change', updatePreview);
        document.getElementById('spotLayout').addEventListener('change', updatePreview);

        // --- 動態新增函數 ---
        function addHighlight(d = { title: "海底餐廳晚宴", desc: "5米深玻璃穹頂下品嚐料理。" }) {
            hCount++; const id = `hl_${hCount}`;
            const html = `<div class="j-card-input" id="${id}"><button type="button" class="btn-close remove-btn" onclick="removeEl('${id}')"></button><input type="text" class="form-control form-control-sm mb-2 f-title" value="${d.title}" placeholder="特色標題"><textarea class="form-control form-control-sm f-desc" rows="2" placeholder="特色說明">${d.desc}</textarea></div>`;
            document.getElementById('highlightsContainer').insertAdjacentHTML('beforeend', html); bindEvt(); updatePreview();
        }

        function addFlight(d = { tag: "去程", from: "TPE", fromT: "10:30", fn: "SQ879", dur: "4h", to: "SIN", toT: "14:55" }) {
            fCount++; const id = `fl_${fCount}`;
            const html = `<div class="j-card-input" id="${id}"><button type="button" class="btn-close remove-btn" onclick="removeEl('${id}')"></button><div class="row g-1 mb-1"><div class="col-4"><input type="text" class="form-control form-control-sm f-tag" value="${d.tag}" placeholder="去程/回程"></div><div class="col-4"><input type="text" class="form-control form-control-sm f-fn" value="${d.fn}" placeholder="航班號"></div><div class="col-4"><input type="text" class="form-control form-control-sm f-dur" value="${d.dur}" placeholder="時長"></div></div><div class="row g-1"><div class="col-6"><input type="text" class="form-control form-control-sm f-fCode" value="${d.from}" placeholder="出發代碼"><input type="text" class="form-control form-control-sm mt-1 f-fTime" value="${d.fromT}" placeholder="出發時間"></div><div class="col-6"><input type="text" class="form-control form-control-sm f-tCode" value="${d.to}" placeholder="抵達代碼"><input type="text" class="form-control form-control-sm mt-1 f-tTime" value="${d.toT}" placeholder="降落時間"></div></div></div>`;
            document.getElementById('flightsContainer').insertAdjacentHTML('beforeend', html); bindEvt(); updatePreview();
        }

        function addSpot(d = { name: "水晶灣 (Crystal Bay)", img: "https://jollifytravel.com/material-alias/mj/japan2026/mj2026-m(2).jpg", desc: "峇里島最清澈的潛水勝地，可與鬼蝠魟共泳。", tag: "潛水勝地" }) {
            spCount++; const id = `sp_${spCount}`;
            const html = `<div class="j-card-input" id="${id}"><button type="button" class="btn-close remove-btn" onclick="removeEl('${id}')"></button><input type="text" class="form-control form-control-sm mb-2 f-name" value="${d.name}" placeholder="景點名稱"><input type="text" class="form-control form-control-sm mb-2 f-img" value="${d.img}" placeholder="圖片網址"><textarea class="form-control form-control-sm mb-2 f-desc" rows="2" placeholder="景點說明">${d.desc}</textarea><input type="text" class="form-control form-control-sm f-tag" value="${d.tag}" placeholder="標籤 (選填)"></div>`;
            document.getElementById('spotsContainer').insertAdjacentHTML('beforeend', html); bindEvt(); updatePreview();
        }

        function addHotel(d = { name: "Soneva Jani", stars: "★★★★★", img: "https://jollifytravel.com/material-alias/mj/japan2026/mj2026-m(3).jpg", desc: "頂級水上別墅。" }) {
            htCount++; const id = `ht_${htCount}`;
            const html = `<div class="j-card-input" id="${id}"><button type="button" class="btn-close remove-btn" onclick="removeEl('${id}')"></button><input type="text" class="form-control form-control-sm mb-2 f-name" value="${d.name}" placeholder="飯店名稱"><input type="text" class="form-control form-control-sm mb-2 f-stars" value="${d.stars}" placeholder="星級 (如 ★★★★★)"><input type="text" class="form-control form-control-sm mb-2 f-img" value="${d.img}" placeholder="圖片網址"><textarea class="form-control form-control-sm f-desc" rows="2" placeholder="簡介">${d.desc}</textarea></div>`;
            document.getElementById('hotelsContainer').insertAdjacentHTML('beforeend', html); bindEvt(); updatePreview();
        }

        function addDayField(d = { route: "", title: "", lead: "", imageUrl: "", imageLabel: "", imageSubtitle: "", points: "", breakfast: "", lunch: "", dinner: "", stay: "" }) {
            dCount++; const id = `day_${dCount}`;
            const html = `
            <div class="j-card-input day-editor-card" id="${id}">

        function getJsContent() {
            return `$(document).ready(function(){
    var container = $('#jollify-tour-module');
    if(container.length === 0) return;
    container.on('click', '.j-day-tab', function(e){
        e.preventDefault();
        container.find('.j-day-tab').removeClass('is-active');
        container.find('.j-day-panel').hide().removeClass('is-active');
        $(this).addClass('is-active');
        var targetPanel = container.find('#' + $(this).data('target'));
        if(targetPanel.length) { targetPanel.show().addClass('is-active'); }
    });

    // 初始化滑動提示
    ` + initDaySwipeHint.toString() + `
    initDaySwipeHint();
});`;
        }

        function updatePreview() {
            const iframe = document.getElementById('previewIframe');
            if (!iframe) return;
            
            let doc = iframe.contentWindow.document;
            
            if (!doc.getElementById('preview-style')) {
                doc.open();
                doc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <style id="preview-style"></style>
                    </head>
                    <body>
                        <div id="preview-content"></div>
                        <script src="https://code.jquery.com/jquery-3.6.0.min.js"><\/script>
                    </body>
                    </html>
                `);
                doc.close();
            }
            
            setTimeout(() => {
                doc = iframe.contentWindow.document;
                const styleEl = doc.getElementById('preview-style');
                const contentEl = doc.getElementById('preview-content');
                if (styleEl) styleEl.textContent = getCssContent();
                if (contentEl) contentEl.innerHTML = getHtmlContent();
                
                const container = doc.getElementById('jollify-tour-module');
                if (container) {
                    const tabs = container.querySelectorAll('.j-day-tab');
                    const panels = container.querySelectorAll('.j-day-panel');
                    tabs.forEach(tab => {
                        tab.onclick = function (e) {
                            e.preventDefault();
                            tabs.forEach(t => t.classList.remove('is-active'));
                            panels.forEach(p => { p.style.display = 'none'; p.classList.remove('is-active'); });
                            this.classList.add('is-active');
                            const target = container.querySelector('#' + this.getAttribute('data-target'));
                            if (target) { target.style.display = 'block'; target.classList.add('is-active'); }
                        };
                    });
                    
                    if(typeof initDaySwipeHint === 'function') {
                        initDaySwipeHint(doc);
                    }
                }
            }, 10);
        }

        document.querySelectorAll('input[name="previewMode"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const container = document.getElementById('livePreviewContainer');
                if (this.value === 'mobile') {
                    container.classList.add('mobile-mode');
                } else {
                    container.classList.remove('mobile-mode');
                }
            });
        });

        function generateOutputCode() {
            document.getElementById('outHtml').value = getHtmlContent();
            document.getElementById('outCss').value = getCssContent();
            document.getElementById('outJs').value = getJsContent();
            document.getElementById('outputSection').classList.remove('d-none');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(elementId) {
            const ta = document.getElementById(elementId);
            ta.select(); document.execCommand('copy');
            alert(`📋 複製成功！`);
        }

        // 初次載入預覽
        updatePreview();

    </script>
</body>
